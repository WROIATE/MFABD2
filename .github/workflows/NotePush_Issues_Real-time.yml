name: Issue Real-time Notification

on:
  issues:
    types: [opened, closed, reopened, assigned, labeled, unlabeled]

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  issue-notification:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
      
      - name: Prepare Issue Message
        id: prepare_message
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_AUTHOR="${{ github.event.issue.user.login }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_STATE="${{ github.event.issue.state }}"
          ISSUE_ACTION="${{ github.event.action }}"
          
          echo "еӨ„зҗҶдәӢд»¶: $ISSUE_ACTION (Issue #$ISSUE_NUMBER)"
          
          # еҰӮжһңжҳҜ opened дәӢд»¶пјҢзӯүеҫ…дёҖж®өж—¶й—ҙжЈҖжҹҘе®Ңж•ҙзҠ¶жҖҒ
          if [ "$ISSUE_ACTION" == "opened" ]; then
            echo "жЈҖжөӢеҲ°ж–°е»ә IssueпјҢзӯүеҫ…30з§’жЈҖжҹҘе®Ңж•ҙзҠ¶жҖҒ..."
            sleep 30
            
            # и°ғз”Ё API иҺ·еҸ– Issue зҡ„е®Ңж•ҙзҠ¶жҖҒ
            echo "иҺ·еҸ– Issue #$ISSUE_NUMBER зҡ„е®Ңж•ҙзҠ¶жҖҒ..."
            ISSUE_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER")
            
            # жҸҗеҸ–ж ҮзӯҫдҝЎжҒҜ
            LABELS=$(echo "$ISSUE_JSON" | jq -r '[.labels[].name] | join(", ")')
            LABEL_COUNT=$(echo "$ISSUE_JSON" | jq -r '.labels | length')
            
            # жҸҗеҸ–еҲҶй…ҚдҝЎжҒҜ
            ASSIGNEES=$(echo "$ISSUE_JSON" | jq -r '[.assignees[].login] | join(", ")')
            ASSIGNEE_COUNT=$(echo "$ISSUE_JSON" | jq -r '.assignees | length')
            
            # жһ„е»әеҗҲе№¶ж¶ҲжҒҜ
            ACTION_EMOJI="рҹ“қ"
            ACTION_TEXT="ж–°е»әдәҶ Issue"
            TITLE="$ACTION_EMOJI [${{ github.repository }}] $ACTION_TEXT"
            
            CONTENT="ж Үйўҳ: $ISSUE_TITLE"
            CONTENT="$CONTENT | дҪңиҖ…: $ISSUE_AUTHOR"
            CONTENT="$CONTENT | зј–еҸ·: #$ISSUE_NUMBER"
            CONTENT="$CONTENT | зҠ¶жҖҒ: $ISSUE_STATE"
            
            # ж·»еҠ ж ҮзӯҫдҝЎжҒҜпјҲеҰӮжһңжңүпјү
            if [ "$LABEL_COUNT" -gt 0 ]; then
              if [ "$LABEL_COUNT" -eq 1 ]; then
                CONTENT="$CONTENT | ж Үзӯҫ: $LABELS"
              else
                CONTENT="$CONTENT | ж Үзӯҫ: $LABELS ($LABEL_COUNTдёӘ)"
              fi
            fi
            
            # ж·»еҠ еҲҶй…ҚдҝЎжҒҜпјҲеҰӮжһңжңүпјү
            if [ "$ASSIGNEE_COUNT" -gt 0 ]; then
              if [ "$ASSIGNEE_COUNT" -eq 1 ]; then
                CONTENT="$CONTENT | еҲҶй…Қз»ҷ: $ASSIGNEES"
              else
                CONTENT="$CONTENT | еҲҶй…Қз»ҷ: $ASSIGNEES ($ASSIGNEE_COUNTдәә)"
              fi
            fi
            
            echo "еҗҲе№¶еҗҺзҡ„ж¶ҲжҒҜпјҲеҢ…еҗ«$LABEL_COUNTдёӘж ҮзӯҫпјҢ$ASSIGNEE_COUNTдёӘеҲҶй…Қпјү"
            
          else
            # еҜ№дәҺйқһ opened дәӢд»¶пјҢжЈҖжҹҘжҳҜеҗҰеңЁж–°е»әеҗҺзҡ„зҹӯж—¶й—ҙеҶ…
            ISSUE_CREATED_AT="${{ github.event.issue.created_at }}"
            CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            
            # и®Ўз®—ж—¶й—ҙе·®пјҲз§’пјү
            CREATED_EPOCH=$(date -d "$ISSUE_CREATED_AT" +%s)
            CURRENT_EPOCH=$(date -d "$CURRENT_TIME" +%s)
            TIME_DIFF=$((CURRENT_EPOCH - CREATED_EPOCH))
            
            echo "Issue еҲӣе»әдәҺ: $ISSUE_CREATED_AT"
            echo "еҪ“еүҚж—¶й—ҙ: $CURRENT_TIME"
            echo "ж—¶й—ҙе·®: $TIME_DIFF з§’"
            
            # еҰӮжһң Issue жҳҜ2еҲҶй’ҹеҶ…ж–°е»әзҡ„пјҢжҠ‘еҲ¶еҚ•зӢ¬зҡ„ж Үзӯҫ/еҲҶй…ҚдәӢд»¶
            if [ "$TIME_DIFF" -lt 120 ]; then
              echo "жҠ‘еҲ¶зҹӯж—¶й—ҙеҶ…зҡ„дәӢд»¶: $ISSUE_ACTION (Issue еҲҡеҲӣе»ә)"
              echo "skip_notification=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            # жӯЈеёёеӨ„зҗҶе…¶д»–дәӢд»¶
            case "$ISSUE_ACTION" in
              "closed")
                ACTION_EMOJI="вң…"
                ACTION_TEXT="е…ій—ӯдәҶ Issue"
                ;;
              "reopened")
                ACTION_EMOJI="рҹ”„"
                ACTION_TEXT="йҮҚж–°жү“ејҖдәҶ Issue"
                ;;
              "assigned")
                ACTION_EMOJI="рҹ‘Ө"
                ACTION_TEXT="еҲҶй…ҚдәҶ Issue"
                ASSIGNEE="${{ github.event.issue.assignee.login }}"
                ;;
              "labeled")
                ACTION_EMOJI="рҹҸ·пёҸ"
                ACTION_TEXT="ж·»еҠ дәҶж Үзӯҫ"
                LABEL_NAME="${{ github.event.label.name }}"
                ;;
              "unlabeled")
                ACTION_EMOJI="рҹҸ·пёҸ"
                ACTION_TEXT="з§»йҷӨдәҶж Үзӯҫ"
                LABEL_NAME="${{ github.event.label.name }}"
                ;;
              *)
                ACTION_EMOJI="рҹ“Ң"
                ACTION_TEXT="жӣҙж–°дәҶ Issue"
                ;;
            esac
            
            TITLE="$ACTION_EMOJI [${{ github.repository }}] $ACTION_TEXT"
            CONTENT="ж Үйўҳ: $ISSUE_TITLE"
            CONTENT="$CONTENT | дҪңиҖ…: $ISSUE_AUTHOR"
            CONTENT="$CONTENT | зј–еҸ·: #$ISSUE_NUMBER"
            
            case "$ISSUE_ACTION" in
              "assigned")
                CONTENT="$CONTENT | еҲҶй…Қз»ҷ: $ASSIGNEE"
                ;;
              "labeled")
                CONTENT="$CONTENT | ж Үзӯҫ: $LABEL_NAME"
                ;;
              "unlabeled")
                CONTENT="$CONTENT | ж Үзӯҫ: $LABEL_NAME"
                ;;
              *)
                CONTENT="$CONTENT | зҠ¶жҖҒ: $ISSUE_STATE"
                ;;
            esac
          fi
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "content=$CONTENT" >> $GITHUB_OUTPUT
          echo "skip_notification=false" >> $GITHUB_OUTPUT
          
          echo "з”ҹжҲҗзҡ„ж¶ҲжҒҜ:"
          echo "ж Үйўҳ: $TITLE"
          echo "еҶ…е®№: $CONTENT"
      
      - name: Send QQ Notification
        if: steps.prepare_message.outputs.skip_notification != 'true'
        uses: Y2Nk4/qmsg-action@master
        with:
          # qq: ${{ needs.meta.outputs.version_type == 'ci' && secrets.QMSG_QQ_DEV || secrets.QMSG_QQ_PUB }}
          # groups: ${{ needs.meta.outputs.version_type == 'ci' && secrets.QMSG_GROUPS_DEV || secrets.QMSG_GROUPS_PUB }}
          groups: ${{ secrets.QMSG_GROUPS_DEV }}
          key: ${{ secrets.QMSG_KEY }}
          message: |
            ${{ steps.prepare_message.outputs.title }}
            ${{ steps.prepare_message.outputs.content }}
      
      - name: Skip Notification Log
        if: steps.prepare_message.outputs.skip_notification == 'true'
        run: |
          echo "и·іиҝҮжҺЁйҖҒ: ${{ github.event.action }} дәӢд»¶иў«жҠ‘еҲ¶"