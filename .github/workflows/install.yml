name: install

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:
    inputs:
      deploy_beta:
        type: boolean
        description: '发布公测版'
        default: false  # 默认不勾选，避免误触
      ci_as_stable:
        type: boolean
        description: 'CI版本作为正式发布（非预发布）'
        default: false

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 使用环境变量获取引用信息
          is_tag_push=false
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            is_tag_push=true
          fi
          
          # 获取提交信息（用于检测 [deploy-beta]）
          commit_message="${{ github.event.head_commit.message }}"
          
          if [ "$is_tag_push" = true ]; then
            # 正式标签：直接使用标签名
            tag="${GITHUB_REF#refs/tags/}"
            version_type="release"
          else
            # 获取最新的正式版本标签（只匹配纯粹的正式版，不包含-beta或-ci）
            base_tag=$(git tag -l "v*" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            
            # 如果没有找到纯版本号标签，使用默认值
            if [ -z "$base_tag" ] || [[ "$base_tag" != v*.*.* ]]; then
              base_tag="v0.0.0"
            fi
            
            commit_short=$(git rev-parse --short HEAD)
            date_suffix=$(date +"%y%m%d")
            
            # 判断版本类型
            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "${{ github.event.inputs.deploy_beta }}" = "true" ]; then
              # 公测版：在基础版本上增加补丁版本号
              incremented_tag=$(echo "$base_tag" | awk -F. '{printf "%s.%s.%s", $1, $2, $3+1}')
              tag="${incremented_tag}-beta.${date_suffix}.${commit_short}"
              version_type="beta"
            elif echo "$commit_message" | tail -n1 | grep -q "\[deploy-beta\]"; then
              # 公测版：在基础版本上增加补丁版本号
              incremented_tag=$(echo "$base_tag" | awk -F. '{printf "%s.%s.%s", $1, $2, $3+1}')
              tag="${incremented_tag}-beta.${date_suffix}.${commit_short}"
              version_type="beta"
            else
              # 开发版：使用基础版本号，不增加补丁版本
              tag="${base_tag}-ci.${date_suffix}.${commit_short}"
              version_type="ci"
            fi
          fi
          
          # 添加调试信息
          echo "Base tag: $base_tag"
          echo "Generated tag: $tag"
          echo "Commit short: $commit_short"
          echo "Date suffix: $date_suffix"
          echo "Version type: $version_type"
          
          echo "tag=$tag" | tee -a $GITHUB_OUTPUT
          echo "is_tag_push=$is_tag_push" | tee -a $GITHUB_OUTPUT
          echo "is_dev_version=$([ "$version_type" = "ci" ] && echo "true" || echo "false")" | tee -a $GITHUB_OUTPUT
          echo "version_type=$version_type" | tee -a $GITHUB_OUTPUT
      - name: Download MFAA for Detection
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          latest: true
          fileName: "MFAAvalonia-*-linux-x64*" # 只下这个用于探测
          out-file-path: "temp_detect"
          extract: true

      # 运行脚本提取版本
      - name: Detect Version
        id: detect_maa
        run: |
          cat << 'EOF' > detect.py
          import sys, ctypes, os
          from pathlib import Path
          
          # 递归找到 .so 文件
          root = Path("temp_detect")
          lib_path = next(root.rglob("libMaaFramework.so"), None)
          
          if not lib_path:
              print("::error::找不到 .so 文件，MFAA 结构可能变了！")
              sys.exit(1)
              
          try:
              lib = ctypes.CDLL(str(lib_path))
              lib.MaaVersion.restype = ctypes.c_char_p
              ver = lib.MaaVersion().decode('utf-8')
              print(f"Detected: {ver}")
              # 输出到 GitHub Output
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"version={ver}\n")
          except Exception as e:
              print(f"::error::加载失败: {e}")
              sys.exit(1)
          EOF
          python3 detect.py
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_tag_push: ${{ steps.set_tag.outputs.is_tag_push }}
      is_dev_version: ${{ steps.set_tag.outputs.is_dev_version }}
      version_type: ${{ steps.set_tag.outputs.version_type }}
      maa_version: ${{ steps.detect_maa.outputs.version }}

  install:
    needs: meta
    runs-on: macos-latest
    
    env:
      MAA_VERSION: ${{ needs.meta.outputs.maa_version }}
    strategy:
      matrix:
        os: [win, macos, linux, android]
        arch: [aarch64, x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # 新增：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 安装./requirements.txt内容注意维护(不要包含Maafw !)
      # 使用 meta 探测到的版本号安装 MaaFramework Python 绑定
      - name: Install Requirements 
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Installing maafw==$MAA_VERSION"
          pip install maafw==$MAA_VERSION

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Download MFAAvalonia
        if: matrix.os != 'android'
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ (matrix.os == 'win' && 'win') || (matrix.os == 'macos' && 'osx') || (matrix.os == 'linux' && 'linux') }}-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          #安装最新版
          # latest: true
          #安装固定旧版
          tag: "v2.2.7"
          out-file-path: "MFA"
          extract: true

      - name: Restore Assets (Clone from Resource Repo)
        uses: actions/checkout@v4
        with:
          repository: sunyink/MFABD2-Assets
          ref: master
          path: temp_assets
          fetch-depth: 1
      
      - name: Merge Assets
        shell: bash
        run: |
          # 创建目标目录结构（如果不存在）
          mkdir -p assets/MaaCommonAssets
          
          # 将临时目录里的 MaaCommonAssets 里的内容，移动到主仓库的 assets/MaaCommonAssets 下
          # 这样就解开了 "MaaCommonAssets/MaaCommonAssets" 的套娃
          cp -r temp_assets/MaaCommonAssets/* assets/MaaCommonAssets/
          
          # 清理临时目录
          rm -rf temp_assets
          
          # 验证
          echo "✅ 资源合并完成，当前 assets 目录结构："
          ls -R assets/

          
      - name: Clean up MFAAvalonia archive
        if: matrix.os != 'android'
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"

      - name: Setup Embed Python (Windows)
        if: matrix.os == 'win'
        shell: bash
        run: |
          # 1. 下载 Python 3.10 嵌入式版本
          curl -L -o python_embed.zip https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip
          
          # 2. 解压
          mkdir -p install/python
          7z x python_embed.zip -oinstall/python
          
          # 3. 开启 site 支持 (改用 Python 命令，防止 macOS/Linux 的 sed 冲突)
          python3 -c "import pathlib; p = pathlib.Path('install/python/python310._pth'); p.write_text(p.read_text().replace('#import site', 'import site'))"
          echo "=== Debug: Content of requirements.txt ==="
          cat requirements.txt
          echo "=========================================="

          # 4. 重点：下载【Windows 平台】的依赖包 (加上 --platform 选项)
          # 如果不加下面这些参数， Mac 跑 CI 就会下载到 Mac 版的库，导致用户在 Win 用不了
          python3 -m pip install \
            --platform win_amd64 \
            --python-version 3.10 \
            --only-binary=:all: \
            --no-cache-dir \
            numpy==1.26.4 \
            -r requirements.txt \
            maafw==$MAA_VERSION \
            --target install/python/Lib/site-packages
      - name: Install
        shell: bash
        run: |
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ env.MAA_VERSION }}

          if [[ "${{ matrix.os }}" != "android" ]]; then
            if [ -d "MFA" ]; then
              mkdir -p install
              rsync -av --ignore-existing MFA/ install/
            fi
          fi
      # 删除 Python 包内的冗余 bin 目录
      # 针对 MFABD2 的目录结构 (install/python/Lib/site-packages/maa/bin)
      # 这一步会扫描 install 目录下所有的 maa/bin 并删除
      # =======================================================
      - name: Remove redundant MAA binaries (Deduplication)
        if: matrix.os != 'android'
        run: |
          python3 -c "
          import shutil
          from pathlib import Path

          root = Path('install')
          
          # 1. 寻找源 plugins 目录 (在 python 包里)
          src_plugins = next(root.rglob('**/site-packages/maa/bin/plugins'), None)
          
          # 2. 寻找目标 native 目录 (在 runtimes 里)
          # 假设 install/runtimes 下只有一个平台文件夹，或者我们只关心 native 层级
          target_native = next(root.rglob('runtimes/*/native'), None)
          
          # 3. 如果两者都存在，执行移动
          if src_plugins and target_native and src_plugins.exists():
              dest_plugins = target_native / 'plugins'
              if not dest_plugins.exists():
                  print(f'Moving plugins from {src_plugins} to {dest_plugins}')
                  shutil.move(str(src_plugins), str(dest_plugins))
              else:
                  print(f'Target plugins dir already exists: {dest_plugins}')

          # 4. 安全删除所有冗余的 bin 目录
          for p in root.rglob('**/site-packages/maa/bin'):
              if p.is_dir():
                  print(f'Removing redundant bin: {p}')
                  shutil.rmtree(p)
          "
          
      - uses: actions/upload-artifact@v4
        with:
          name: MFABD2-${{ needs.meta.outputs.tag }}-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: meta
    outputs:
      release_body: ${{ steps.set_release_body.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ✅ 使用新系统替换git-cliff
      - name: Generate comprehensive changelog
        id: merge_changelog
        run: |
          cd scripts
          python changelog_generator.py
        env:
          CURRENT_TAG: ${{ needs.meta.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Set release body
        id: set_release_body
        run: |
          content=$(cat CHANGES.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    if: (needs.meta.outputs.is_tag_push == 'true') || contains(needs.meta.outputs.tag, '-beta') || (github.event_name == 'workflow_dispatch' && contains(needs.meta.outputs.tag, '-ci'))
    needs: [meta, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Get current timestamp
        id: get_time
        run: echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Package release assets
        run: |
          cd artifacts
          mkdir -p release_assets
          for dir in *; do
            # 直接使用目录名作为 zip 文件名
            zip_name="${dir}.zip"
            
            # 创建压缩包
            (cd "$dir" && zip -r "../release_assets/$zip_name" .)
          done
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release_assets/*.zip
          tag_name: ${{ needs.meta.outputs.tag }}
          name: "MFABD2 ${{ needs.meta.outputs.tag }}"
          target_commitish: ${{ github.sha }}
          body: |
            ${{ contains(needs.changelog.outputs.release_body, '## ') && needs.changelog.outputs.release_body || '### 无显著变更' }}
            
          draft: false
          prerelease: ${{ contains(needs.meta.outputs.tag, '-beta') || (contains(needs.meta.outputs.tag, '-ci') && !(github.event_name == 'workflow_dispatch' && github.event.inputs.ci_as_stable == 'true')) }}
        env:  # 添加环境变量以支持高限额API调用
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Trigger MirrorChyanUploading
        if: github.repository_owner == 'sunyink' && ((needs.meta.outputs.is_tag_push == 'true') || contains(needs.meta.outputs.tag, '-beta'))
        shell: bash
        env:
            tag: ${{ needs.meta.outputs.tag }}
            body: ${{ needs.changelog.outputs.release_body }}
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "安全触发镜像服务: 版本=$tag"
          # 触发包发布流程
          gh workflow run --repo $GITHUB_REPOSITORY --ref ${{ github.ref }} mirrorchyan.yml -f tag=$tag
          # 触发更新信息推送流程
          gh workflow run --repo $GITHUB_REPOSITORY --ref ${{ github.ref }} mirrorchyan_release_note.yml -f tag=$tag -f body="$body"

  notify:
    needs: [meta, install]
    if: always() && needs.install.result == 'success' && github.event_name != 'pull_request' && !(github.ref_name == 'main' && needs.meta.outputs.version_type == 'ci')
    runs-on: ubuntu-latest
    steps:
      - name: Extract commit info 
        id: commit-info
        run: |
          # 调试：显示所有可用参数
          echo "=== 调试信息 ==="
          echo "GITHUB_EVENT_NAME: $GITHUB_EVENT_NAME"
          echo "HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}"
          echo "HEAD_COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}"
          echo "GITHUB_SHA: $GITHUB_SHA"
          
          # 设置默认值
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="手动触发工作流"
          fi
          
          COMMIT_TIMESTAMP="${{ github.event.head_commit.timestamp }}"
          if [ -z "$COMMIT_TIMESTAMP" ]; then
            COMMIT_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          
          COMMIT_SHA="${{ github.sha }}"
          if [ -z "$COMMIT_SHA" ]; then
            COMMIT_SHA="unknown"
          fi
          
          # 提取第一行作为摘要
          SUBJECT=$(echo "$COMMIT_MSG" | head -n 1)
          
          # 简化描述处理
          if [ $(echo "$COMMIT_MSG" | wc -l) -gt 1 ]; then
            BODY=$(echo "$COMMIT_MSG" | tail -n +2 | head -c 100 | tr -d '\n')
            if [ ${#BODY} -eq 100 ]; then
              BODY="$BODY..."
            fi
          else
            BODY=""
          fi
          
          # 格式化时间戳为东八区时间
          TIME=$(TZ='Asia/Shanghai' date -d "$COMMIT_TIMESTAMP" +"%Y-%m-%d %H:%M:%S")
          
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          # 输出变量
          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          echo "=== 处理结果 ==="
          echo "Subject: $SUBJECT"
          echo "Body: $BODY" 
          echo "Time: $TIME"
          echo "Short SHA: $SHORT_SHA"
      
      - name: Send Notification
        uses: Y2Nk4/qmsg-action@master
        with:
          qq: ${{ secrets.QMSG_NOTIFY_QQ }}
          groups: ${{ secrets.QMSG_NOTIFY_GROUPS }}
          key: ${{ secrets.QMSG_KEY }}
          message: |
            🏗️ [${{ github.repository }}] 构建完成
            👤 提交者: ${{ github.actor }}
            🌿 分支: ${{ github.ref_name }}
            🏷️ 版本: ${{ needs.meta.outputs.tag }}
            📦 类型: ${{ contains(needs.meta.outputs.tag, '-beta') && '公测版' || (contains(needs.meta.outputs.tag, '-ci') && '开发版' || '正式版') }}
            🆔 提交哈希: ${{ steps.commit-info.outputs.short_sha }}
            ⏱️ 提交时间: ${{ steps.commit-info.outputs.time }}
            📝 摘要: ${{ steps.commit-info.outputs.subject }}
            ${{ steps.commit-info.outputs.body != '' && format('📖 描述: {0}', steps.commit-info.outputs.body) || '📖 描述: 无' }}
            🔗 查看提交: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            🔨 构建下载: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
