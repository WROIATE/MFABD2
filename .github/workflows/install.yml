name: install

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "assets/**"
      - "**.py"
  workflow_dispatch:
    inputs:
      deploy_beta:
        type: boolean
        description: '发布公测版'
        default: false  # 默认不勾选，避免误触
      deploy_alpha:
        type: boolean
        description: '发布内测版'
        default: false
      ci_as_stable:
        type: boolean
        description: 'CI版本作为正式发布（非预发布）'
        default: false
      notice_text:
        type: string
        description: '⚠️ 说明 / Note'
        required: false
        default: '不勾选任何选项，手动触发即为CI发版'

jobs:
  meta:
    runs-on: ubuntu-latest
    if: "github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || !contains(github.event.head_commit.message, '[deploy-sync]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        # 通过环境变量传递 Commit Message，防止反引号注入攻击
        env:
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # 使用环境变量获取引用信息
          is_tag_push=false
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            is_tag_push=true
          fi
          
          # 获取提交信息（用于检测 [deploy-beta]）
          commit_message="$HEAD_COMMIT_MSG"
          
          if [ "$is_tag_push" = true ]; then
            # 正式标签：直接使用标签名
            tag="${GITHUB_REF#refs/tags/}"
            version_type="release"
          else
            # 获取最新的正式版本标签
            base_tag=$(git tag -l "v*" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            
            # 如果没有找到纯版本号标签，使用默认值
            if [ -z "$base_tag" ] || [[ "$base_tag" != v*.*.* ]]; then
              base_tag="v0.0.0"
            fi
            
            commit_short=$(git rev-parse --short HEAD)
            date_suffix=$(date +"%y%m%d")
            
           # 判断版本类型
            # 优先判断 Alpha
            if ([ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "${{ github.event.inputs.deploy_alpha }}" = "true" ]) || echo "$commit_message" | tail -n1 | grep -q "\[deploy-alpha\]"; then
               # 内测版：在基础版本上增加 2 个补丁版本号 (Base + 2)
               # 修改点：将 $3+1 改为 $3+2
              incremented_tag=$(echo "$base_tag" | awk -F. '{printf "%s.%s.%s", $1, $2, $3+2}')
              tag="${incremented_tag}-alpha.${date_suffix}.${commit_short}"
              version_type="alpha"
            
            # 原有的 Beta 判断
            elif ([ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "${{ github.event.inputs.deploy_beta }}" = "true" ]) || echo "$commit_message" | tail -n1 | grep -q "\[deploy-beta\]"; then
              # 公测版：在基础版本上增加 1 个补丁版本号 (Base + 1)
              incremented_tag=$(echo "$base_tag" | awk -F. '{printf "%s.%s.%s", $1, $2, $3+1}')
              tag="${incremented_tag}-beta.${date_suffix}.${commit_short}"
              version_type="beta"
            
            # 原有的 CI 判断 (else 分支)
            else
              tag="${base_tag}-ci.${date_suffix}.${commit_short}"
              version_type="ci"
            fi
          fi
          
          # 添加调试信息
          echo "Base tag: $base_tag"
          echo "Generated tag: $tag"
          echo "Commit short: $commit_short"
          echo "Date suffix: $date_suffix"
          echo "Version type: $version_type"
          
          echo "tag=$tag" | tee -a $GITHUB_OUTPUT
          echo "is_tag_push=$is_tag_push" | tee -a $GITHUB_OUTPUT
          echo "is_dev_version=$([ "$version_type" = "ci" ] && echo "true" || echo "false")" | tee -a $GITHUB_OUTPUT
          echo "version_type=$version_type" | tee -a $GITHUB_OUTPUT

        # 2. 下载资源 (用于探测)
      - name: Parse Configuration
        id: parse_config
        run: |
          python3 -c "
          import re, os, sys
          req_file = 'requirements.txt'
          mfaa_tag = ''
          if os.path.exists(req_file):
              with open(req_file, 'r', encoding='utf-8') as f:
                  for line in f:
                      m = re.match(r'^#\s*MFAA_TAG=(v[\w\.\-]+)', line.strip())
                      if m: mfaa_tag = m.group(1); break
          if not mfaa_tag:
              print('::error::未找到 # MFAA_TAG 配置'); sys.exit(1)
          print(f'✅ 目标资源版本: {mfaa_tag}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'mfaa_tag={mfaa_tag}\n')
          "

      # [修改] 下载资源 (改用 steps.parse_config.outputs.mfaa_tag)
      - name: Download MFAA for Detection
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          latest: false
          tag: ${{ steps.parse_config.outputs.mfaa_tag }}
          fileName: "MFAAvalonia-*-linux-x64*"
          out-file-path: "temp_detect"
          extract: true

      # 3. 探测内核版本
      # 3. 探测内核版本 (修复版)
      # 3. 探测内核版本 (修复版)
      - name: Detect Core Version
        id: detect_maa
        run: |
          # 1. 使用 find 查找文件的【绝对路径】(加上 $(pwd))
          SO_FILE=$(find "$(pwd)/temp_detect" -name "libMaaFramework.so" | head -n 1)
          
          if [ -z "$SO_FILE" ]; then
            echo "::error::根本找不到 libMaaFramework.so 文件！"
            exit 1
          fi
          
          SO_DIR=$(dirname "$SO_FILE")
          echo "📍 定位到库文件: $SO_FILE"
          echo "🔧 库目录: $SO_DIR"
          
          # 2. 【关键】设置 LD_LIBRARY_PATH 为绝对路径
          # 这告诉 Linux："加载库的时候，去这个目录里找依赖！"
          export LD_LIBRARY_PATH="$SO_DIR:$LD_LIBRARY_PATH"
          
          # 3. 【调试神器】运行 ldd
          # 如果后面 Python 报错，看这部分日志就知道缺哪个库了
          echo "=== 🕵️‍♂️ 依赖检查 (ldd) ==="
          ldd "$SO_FILE" || true
          echo "========================="
          
          # 4. 生成探测脚本
          cat << 'EOF' > detect.py
          import sys, ctypes, os
          
          # 从环境变量获取刚才找到的绝对路径
          so_path = os.environ.get("TARGET_SO_PATH")
          print(f"🐍 Python loading: {so_path}")
          
          try:
              # mode=ctypes.RTLD_GLOBAL 有时能解决跨库符号依赖问题
              lib = ctypes.CDLL(so_path, mode=ctypes.RTLD_GLOBAL)
              
              lib.MaaVersion.restype = ctypes.c_char_p
              ver = lib.MaaVersion().decode('utf-8')
              
              print(f"✅ Detected Core: {ver}")
              
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"version={ver}\n")
                  
          except Exception as e:
              print(f"::error::加载失败: {e}")
              sys.exit(1)
          EOF
          
          # 5. 运行脚本 (传入路径变量)
          export TARGET_SO_PATH="$SO_FILE"
          python3 detect.py
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_tag_push: ${{ steps.set_tag.outputs.is_tag_push }}
      is_dev_version: ${{ steps.set_tag.outputs.is_dev_version }}
      version_type: ${{ steps.set_tag.outputs.version_type }}
      maa_version: ${{ steps.detect_maa.outputs.version }}
      mfaa_tag: ${{ steps.parse_config.outputs.mfaa_tag }}

  install:
    needs: meta
    runs-on: macos-latest
    
    env:
      MAA_VERSION: ${{ needs.meta.outputs.maa_version }}
      MFAA_TAG: ${{ needs.meta.outputs.mfaa_tag }}
    strategy:
      matrix:
        os: [win, macos, linux, android]
        arch: [aarch64, x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # 新增：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      
      # 使用 meta 探测到的版本号安装 MaaFramework Python 绑定
      - name: Install Requirements 
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 显式安装探测到的匹配版本
          echo "Installing matched core: maafw==$MAA_VERSION"
          pip install maafw==$MAA_VERSION

      - name: Download MFAAvalonia
        id: download_mfa
        if: matrix.os != 'android'
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          latest: false
          tag: ${{ env.MFAA_TAG }}
          fileName: "MFAAvalonia-*-${{ matrix.os == 'macos' && 'osx' || matrix.os }}*"
          out-file-path: "MFA"
          extract: true

          # [新增] 专门为 Android 下载 MaaFramework 内核
      - name: Download MaaFramework (Android)
        if: matrix.os == 'android'
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          latest: false
          tag: "${{ env.MAA_VERSION }}"
          # Android 将通配符逻辑调整为匹配 "MAA-android-{架构}-xxxx"
          fileName: "MAA-android-${{ matrix.arch }}*"
          out-file-path: "AndroidCore"
          extract: true

      - name: Restore Assets (Clone from Resource Repo)
        uses: actions/checkout@v4
        with:
          repository: sunyink/MFABD2-Assets
          ref: master
          path: temp_assets
          fetch-depth: 1
      
      - name: Merge Assets
        shell: bash
        run: |
          # 创建目标目录结构（如果不存在）
          mkdir -p assets/MaaCommonAssets
          
          # 将临时目录里的 MaaCommonAssets 里的内容，移动到主仓库的 assets/MaaCommonAssets 下
          # 这样就解开了 "MaaCommonAssets/MaaCommonAssets" 的套娃
          cp -r temp_assets/MaaCommonAssets/* assets/MaaCommonAssets/
          
          # 清理临时目录
          rm -rf temp_assets
          
          # 验证
          echo "✅ 资源合并完成，当前 assets 目录结构："
          ls -R assets/

          
      - name: Clean up MFAAvalonia archive
        if: matrix.os != 'android'
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"

      - name: Setup Embed Python (Windows)
        if: matrix.os == 'win'
        shell: bash
        run: |
          # 1. 下载 Python 3.10 嵌入式版本
          curl -L -o python_embed.zip https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip
          
          # 2. 解压
          mkdir -p install/python
          7z x python_embed.zip -oinstall/python
          
          # 3. 开启 site 支持 (改用 Python 命令，防止 macOS/Linux 的 sed 冲突)
          python3 -c "import pathlib; p = pathlib.Path('install/python/python310._pth'); p.write_text(p.read_text().replace('#import site', 'import site'))"
          echo "=== Debug: Content of requirements.txt ==="
          cat requirements.txt
          echo "=========================================="

          # 4. 重点：下载【Windows 平台】的依赖包 (加上 --platform 选项)
          # 如果不加下面这些参数， Mac 跑 CI 就会下载到 Mac 版的库，导致用户在 Win 用不了
          python3 -m pip install \
            --platform win_amd64 \
            --python-version 3.10 \
            --only-binary=:all: \
            --no-cache-dir \
            numpy==1.26.4 \
            -r requirements.txt \
            maafw==$MAA_VERSION \
            --target install/python/Lib/site-packages
      - name: Install & Merge
        shell: bash
        run: |
          # 1. 运行 install.py (处理配置、注入版本号、生成资源目录等)
          # install.py 会创建 'install' 目录并放入 resource 和 agent
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ env.MAA_VERSION }}

          # 2. [桌面端逻辑] 合并 MFAAvalonia 到 install 目录
          if [[ "${{ matrix.os }}" != "android" ]]; then
            if [ -d "MFA" ]; then
              mkdir -p install
              # 使用 rsync 覆盖，确保 UI 和 Core 都在正确位置
              rsync -av MFA/ install/
            fi
          
          # 3. [新增][安卓逻辑] 合并 MaaFramework Core 到 install 目录
          else
            echo "🤖 处理 Android 内核合并..."
            if [ -d "AndroidCore" ]; then
              # AndroidCore 解压后通常包含 bin, lib, share, include 等
              # 我们将它们直接复制到 install 根目录下
              cp -r AndroidCore/* install/
              echo "✅ Android 内核已合并"
            else
              echo "❌ 未找到 AndroidCore 目录，下载可能失败"
              exit 1
            fi
          fi

      # [核心修复 1] 强力清理残留的压缩包 (解决根目录 85MB 问题)
      - name: Cleanup Archives
        shell: bash
        run: |
          echo "🧹 Cleaning up zip/tar.gz files..."
          # 1. 删除根目录的
          rm -f *.zip *.tar.gz 
          # 2. 删除 MFA 源目录的
          rm -f MFA/*.zip MFA/*.tar.gz
          # 3. [关键补刀] 删除 install 目录里被 rsync 拷进去的
          rm -f install/*.zip install/*.tar.gz
          # 4.删安卓构建包
          rm -rf AndroidCore
          
          echo "✅ Cleanup done."

      # [核心修复 2] 还原原版逻辑：利用矩阵 (Matrix) 清理 runtimes
      # 既然我们下载的是"全家桶"，那我们就根据 matrix.os 和 matrix.arch 把不需要的肢解掉
      - name: Prune Runtimes (Architecture Slimming)
        if: matrix.os != 'android'
        shell: bash
        run: |
          python3 -c "
          import shutil
          import os
          from pathlib import Path

          # 获取矩阵定义的'正确'架构
          # win / macos / linux
          matrix_os = '${{ matrix.os }}'
          # x86_64 / aarch64
          matrix_arch = '${{ matrix.arch }}'

          print(f'🎯 Target: {matrix_os}-{matrix_arch}')
          
          # 定义需要保留的关键词
          # 例如: 如果是 win-x86_64，我们保留 'win' 和 'x64'/'amd64'
          keep_keywords = []
          
          if matrix_os == 'win': keep_keywords.append('win')
          elif matrix_os == 'macos': keep_keywords.append('osx') # runtimes里通常叫osx
          elif matrix_os == 'linux': keep_keywords.append('linux')
          
          if matrix_arch == 'x86_64': 
              keep_keywords.extend(['x64', 'amd64'])
          elif matrix_arch == 'aarch64': 
              keep_keywords.extend(['arm64', 'aarch64'])

          runtimes_dir = Path('install/runtimes')
          if runtimes_dir.exists():
              initial_size = sum(f.stat().st_size for f in runtimes_dir.rglob('*') if f.is_file())
              print(f'📦 Runtimes size before: {initial_size/1024/1024:.2f} MB')

              for p in runtimes_dir.iterdir():
                  if p.is_dir():
                      # 逻辑：如果文件夹名字里【不包含】任何一个保留关键词，就删掉
                      # 比如: 文件夹叫 'osx-arm64'，但我想要 'win' -> 删！
                      # 比如: 文件夹叫 'win-arm64'，我想要 'win' 和 'x64' -> 缺x64 -> 删！
                      
                      # 检查是否包含OS关键词
                      match_os = any(k in p.name for k in keep_keywords if k in ['win', 'osx', 'linux'])
                      # 检查是否包含架构关键词
                      match_arch = any(k in p.name for k in keep_keywords if k in ['x64', 'amd64', 'arm64', 'aarch64'])

                      if not (match_os and match_arch):
                          print(f'🗑️ Pruning mismatched runtime: {p.name}')
                          shutil.rmtree(p)
                      else:
                          print(f'✅ Keeping runtime: {p.name}')
                          
              final_size = sum(f.stat().st_size for f in runtimes_dir.rglob('*') if f.is_file())
              print(f'🎉 Runtimes size after: {final_size/1024/1024:.2f} MB')
          else:
              print('⚠️ No runtimes directory found.')
          "
      - name: Inject Announcement & Verify
        shell: bash
        run: |
          echo "::group::🚀 开始注入公告"
          
          # 1. 运行 Python 脚本
          python scripts/inject_announcement.py "${{ needs.meta.outputs.tag }}"
          
          echo "::endgroup::"
          
          echo "::group::👀 验证注入结果"
          
          # 2. [修正] 路径改为 install/resource/Announcement/1.公告.md
          TARGET="install/resource/Announcement/1.公告.md"
          
          if [ -f "$TARGET" ]; then
            echo "✅ 成功定位文件: $TARGET"
            echo "----------------------------------------"
            # 查找锚点，并显示后面 15 行
            grep -A 15 "" "$TARGET" || (echo "⚠️ 未找到锚点，打印头部:" && head -n 20 "$TARGET")
            echo "----------------------------------------"
          else
            echo "❌ 验证失败：文件不存在 ($TARGET)"
            # 调试：列出 install 目录看看结构
            ls -R install/
            exit 1
          fi
          
          echo "::endgroup::"

      # 删除 Python 包内的冗余 bin 目录
      # 针对 MFABD2 的目录结构 (install/python/Lib/site-packages/maa/bin)
      # 这一步会扫描 install 目录下所有的 maa/bin 并删除
      # =======================================================
 
      - name: Remove redundant MAA binaries (Deduplication)
        if: matrix.os != 'android'
        run: |
          python3 -c "
          import shutil
          from pathlib import Path

          root = Path('install')
          
          # 1. 寻找源 plugins 目录 (在 python 包里)
          src_plugins = next(root.rglob('**/site-packages/maa/bin/plugins'), None)
          
          # 2. 寻找目标 native 目录 (在 runtimes 里)
          # 假设 install/runtimes 下只有一个平台文件夹，或者我们只关心 native 层级
          target_native = next(root.rglob('runtimes/*/native'), None)
          
          # 3. 如果两者都存在，执行移动
          if src_plugins and target_native and src_plugins.exists():
              dest_plugins = target_native / 'plugins'
              if not dest_plugins.exists():
                  print(f'Moving plugins from {src_plugins} to {dest_plugins}')
                  shutil.move(str(src_plugins), str(dest_plugins))
              else:
                  print(f'Target plugins dir already exists: {dest_plugins}')

          # 4. 安全删除所有冗余的 bin 目录
          for p in root.rglob('**/site-packages/maa/bin'):
              if p.is_dir():
                  print(f'Removing redundant bin: {p}')
                  shutil.rmtree(p)
          "
          
      - uses: actions/upload-artifact@v4
        with:
          name: MFABD2-${{ needs.meta.outputs.tag }}-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: meta
    outputs:
      release_body: ${{ steps.set_release_body.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ✅ 使用新系统替换git-cliff
      - name: Generate comprehensive changelog
        id: merge_changelog
        run: |
          cd scripts
          python changelog_generator.py
        env:
          CURRENT_TAG: ${{ needs.meta.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}




      # 上传 CHANGES.md 到构建物
      # =======================================================
      - name: Upload Changelog Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CHANGES
          path: CHANGES.md
      # =======================================================
      - name: Set release body
        id: set_release_body
        run: |
          # 使用随机定界符防止内容包含 EOF 导致截断
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "content<<$EOF" >> $GITHUB_OUTPUT
          cat CHANGES.md >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

  release:
    if: (needs.meta.outputs.is_tag_push == 'true') || contains(needs.meta.outputs.tag, '-beta') || contains(needs.meta.outputs.tag, '-alpha') || (github.event_name == 'workflow_dispatch' && contains(needs.meta.outputs.tag, '-ci'))
    needs: [meta, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - name: Get current timestamp
        id: get_time
        run: echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Package release assets
        run: |
          cd artifacts
          mkdir -p release_assets
          for dir in *; do
            # 直接使用目录名作为 zip 文件名
            zip_name="${dir}.zip"
            
            # 创建压缩包
            (cd "$dir" && zip -r "../release_assets/$zip_name" .)
          done
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release_assets/*.zip
          tag_name: ${{ needs.meta.outputs.tag }}
          name: "MFABD2 ${{ needs.meta.outputs.tag }}"
          target_commitish: ${{ github.sha }}
          body: |
            ${{ contains(needs.changelog.outputs.release_body, '## ') && needs.changelog.outputs.release_body || '### 无显著变更' }}
            
          draft: false
          prerelease: ${{ contains(needs.meta.outputs.tag, '-beta') || contains(needs.meta.outputs.tag, '-alpha') || (contains(needs.meta.outputs.tag, '-ci') && !(github.event_name == 'workflow_dispatch' && github.event.inputs.ci_as_stable == 'true')) }}
        env:  # 添加环境变量以支持高限额API调用
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Trigger MirrorChyanUploading
        if: github.repository_owner == 'sunyink' && ((needs.meta.outputs.is_tag_push == 'true') || contains(needs.meta.outputs.tag, '-beta') || contains(needs.meta.outputs.tag, '-alpha'))
        shell: bash
        env:
            tag: ${{ needs.meta.outputs.tag }}
            CHANGELOG_BODY: ${{ needs.changelog.outputs.release_body }}
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "安全触发镜像服务: 版本=$tag"
          # 将 " 替换为 \"
          ESCAPED_BODY="${CHANGELOG_BODY//\"/\\\"}"
          # 触发包发布流程
          gh workflow run --repo $GITHUB_REPOSITORY --ref ${{ github.ref }} mirrorchyan.yml -f tag=$tag
          
          # 触发更新信息推送流程 (现在可以安全处理带引号的日志了)
          gh workflow run --repo $GITHUB_REPOSITORY --ref ${{ github.ref }} mirrorchyan_release_note.yml -f tag=$tag -f body="$ESCAPED_BODY"

  notify:
    needs: [meta, install]
    if: always() && needs.install.result == 'success' && github.event_name != 'pull_request' && !(github.ref_name == 'main' && needs.meta.outputs.version_type == 'ci')
    runs-on: ubuntu-latest
    steps:
      - name: Extract commit info 
        id: commit-info
        run: |
          # 调试：显示所有可用参数
          echo "=== 调试信息 ==="
          echo "GITHUB_EVENT_NAME: $GITHUB_EVENT_NAME"
          echo "HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}"
          echo "HEAD_COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}"
          echo "GITHUB_SHA: $GITHUB_SHA"
          
          # 设置默认值
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="手动触发工作流"
          fi
          
          COMMIT_TIMESTAMP="${{ github.event.head_commit.timestamp }}"
          if [ -z "$COMMIT_TIMESTAMP" ]; then
            COMMIT_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
          
          COMMIT_SHA="${{ github.sha }}"
          if [ -z "$COMMIT_SHA" ]; then
            COMMIT_SHA="unknown"
          fi
          
          # 提取第一行作为摘要
          SUBJECT=$(echo "$COMMIT_MSG" | head -n 1)
          
          # 简化描述处理
          if [ $(echo "$COMMIT_MSG" | wc -l) -gt 1 ]; then
            BODY=$(echo "$COMMIT_MSG" | tail -n +2 | head -c 100 | tr -d '\n')
            if [ ${#BODY} -eq 100 ]; then
              BODY="$BODY..."
            fi
          else
            BODY=""
          fi
          
          # 格式化时间戳为东八区时间
          TIME=$(TZ='Asia/Shanghai' date -d "$COMMIT_TIMESTAMP" +"%Y-%m-%d %H:%M:%S")
          
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          # 输出变量
          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          echo "time=$TIME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          echo "=== 处理结果 ==="
          echo "Subject: $SUBJECT"
          echo "Body: $BODY" 
          echo "Time: $TIME"
          echo "Short SHA: $SHORT_SHA"
      
      - name: Send Notification
        uses: Y2Nk4/qmsg-action@master
        with:
          qq: ${{ secrets.QMSG_NOTIFY_QQ }}
          groups: ${{ secrets.QMSG_NOTIFY_GROUPS }}
          key: ${{ secrets.QMSG_KEY }}
          message: |
            🏗️ [${{ github.repository }}] 构建完成
            👤 提交者: ${{ github.actor }}
            🌿 分支: ${{ github.ref_name }}
            🏷️ 版本: ${{ needs.meta.outputs.tag }}
            📦 类型: ${{ contains(needs.meta.outputs.tag, '-alpha') && '内测版' || (contains(needs.meta.outputs.tag, '-beta') && '公测版' || (contains(needs.meta.outputs.tag, '-ci') && '开发版' || '正式版')) }}
            🆔 提交哈希: ${{ steps.commit-info.outputs.short_sha }}
            ⏱️ 提交时间: ${{ steps.commit-info.outputs.time }}
            📝 摘要: ${{ steps.commit-info.outputs.subject }}
            ${{ steps.commit-info.outputs.body != '' && format('📖 描述: {0}', steps.commit-info.outputs.body) || '📖 描述: 无' }}
            🔗 查看提交: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            🔨 构建下载: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
