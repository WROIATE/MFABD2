version: '1'

# 核心配置：告诉 Sourcery 怎么工作
github:
  # 只在 PR 变动的部分进行评论（不因老代码烦你）
  pr_only: true
  
  # 在 PR 描述里生成一个“本次优化摘要”，看起来很专业
  summary: true
  
  # 忽略某些文件（比如自动生成的代码，或者你借用的别人的库）
  ignore:
    - "**/*_generated.py"  # 比如如果你有自动生成的脚本
    - "vendor/**"          # 第三方库目录

# 规则定制：针对你的 Python 脚本
refactor:
  # 下面这些规则如果太烦人，可以在这里关掉
  skip:
    - assign-if-exp        # 比如你不喜欢把 if/else 压缩成一行
    - swap-if-else-branches # 比如你不喜欢它让你把 if/else 对调
    
  # Python 版本（根据你的环境调整，比如 3.8, 3.10）
  python_version: '3.10'